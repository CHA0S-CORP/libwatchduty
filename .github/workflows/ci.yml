name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package with test + tui extras
        run: pip install -e ".[test,tui]"

      - name: Run pytest
        run: pytest tests/ -ra

      - name: Check for ruff config
        id: ruff_config
        shell: bash
        run: |
          if [ -f ruff.toml ] || [ -f .ruff.toml ] || grep -q "^\[tool\.ruff" pyproject.toml 2>/dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No ruff config found; skipping ruff check."
          fi

      - name: Install ruff
        if: steps.ruff_config.outputs.found == 'true'
        run: pip install ruff

      - name: Run ruff
        if: steps.ruff_config.outputs.found == 'true'
        run: ruff check src tests
