name: Build & publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from pyproject.toml
        id: pkgver
        run: |
          v=$(grep -E '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # The image installs libwatchduty from PyPI, but publish.yml runs
      # concurrently on the same tag push. Wait for the version to land on
      # PyPI so the build doesn't race ahead and fail on a missing release.
      - name: Wait for version on PyPI
        run: |
          v="${{ steps.pkgver.outputs.version }}"
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/libwatchduty/${v}/json" >/dev/null; then
              echo "libwatchduty ${v} available on PyPI"
              exit 0
            fi
            echo "waiting for libwatchduty ${v} on PyPI ($i/30)..."
            sleep 10
          done
          echo "libwatchduty ${v} did not appear on PyPI in time" >&2
          exit 1

      - name: Derive metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/libwatchduty
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # On pushes to main, tag with the version read from
            # pyproject.toml + a sliding 'latest'. That way we don't
            # need a fresh git tag every time docker.yml changes; the
            # version tag tracks whatever was last released to PyPI.
            type=raw,value=${{ steps.pkgver.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LIBWATCHDUTY_VERSION=${{ steps.pkgver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
